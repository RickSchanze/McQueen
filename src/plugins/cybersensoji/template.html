
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @font-face {
            font-family: "fangsong";
            src: url(../../../data/fonts/simfang.ttf);
        }
        
        @font-face {
            font-family: "xinwei";
            src: url(../../../data/fonts/STXINWEI.TTF);
        }
        
        @font-face {
            font-family: "kaiti";
            src: url(../../../data/fonts/STKAITI.TTF);
        }
    
        .main {
            display: flex;
            flex-direction: column;
            width: 700px;
            background-image: url(../../../data/pictures/14.png);
            background-size: cover;
            box-shadow: 5px 5px 20px #c37272;
            margin-left: 13px;
        }

        /* left begin */
        /* 诗词，以及吉凶 */
        .up {
            display: flex;
            flex-direction: row;
            width: 700px;
            background-color: #efefefc2;
        }

        .all {
            font-family: "fangsong";
            font-size: 70px;
            width: 200px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: space-around;
            flex-direction: column;
        }

        .poem {
            font-size: 20px;
        }

        .poem p {
            line-height: 15px;
            color: red;
            font-size: 20px;
        }

        /* 诗词，吉凶 end */
        /* 诗词注解 */
        .bottom {
            width: 700px;
        }

        .explanation {
            font-family: "xinwei";
            font-size: 30px;
            text-align: center;
            width: 700px;
            padding-bottom: 20px;
            padding-top: 20px;
            background-color: #efefefc2;
        }

        .bottom {
            display: flex;
            flex-direction: row;
            background-color: #efefefc2;
        }

        .one-line .poe {
            color:blueviolet;
            font-family: "kaiti";
            font-size: 30px;
        }

        .one-line .exp {
            color: black;
            font-size: 15px;
        }

        li {
            color: brown;
            font-size: 20px;
            margin: 10px;
        }

        .upright {
            width: 400px;
        }

        .botright {
            margin-left: 50px;;
        }
        
        .placeholder {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .one-line {
            height: 120px;
        }
        
        .botleft {
            width: 500px;
        }
        
        .maincover {
            width: 750px;  
        }

    </style>
</head>

<body>
<div class="maincover">
    <div class="main">
        <div class="up">
            <div class="upleft"></div>
            <div class="all">末吉</div>
            <div class="placeholder">
            <div class="poem">
                <p>宅墓鬼凶多</p>
                <p>人事有爻讹</p>
                <p>伤财防损失</p>
                <p>祈福始中和</p>
            </div>
            </div>
            <div class="upright">

                <ul>
    
        
                    <li>
                        <div class="title">因为竭尽祈求神佛的力量，自己尽力努力，能到幸福吧。</div>

                    </li>
        
        
                    <li>
                        <div class="title">愿望：难以实现吧。</div>

                    </li>
        
        
                    <li>
                        <div class="title">疾病：康复很花时间吧。</div>

                    </li>
        
        
                    <li>
                        <div class="title">遗失物：难找到吧。</div>

                    </li>
        
        
                    <li>
                        <div class="title">盼望的人：迟迟地才出现吧。</div>

                    </li>
        
        
                    <li>
                        <div class="title">盖新居、搬家：好吧。</div>

                    </li>
        
        
                    <li>
                        <div class="title">旅行：好吧。</div>

                    </li>
        
        
                    <li>
                        <div class="title">结亲缘、交往：坏吧。</div>

                    </li>
        
    </ul>
            </div>
        </div>
        <div class="explanation">诗词释义</div>
            <div class="bottom">
            <div class="botleft">
                <div class="one-line">
                    <div class="poe">宅墓鬼凶多</div><br />
                    <div class="exp">家中恐怕有灾祸。</div><br />
                </div>
                <div class="one-line">
                    <div class="poe">行为慎重，抱着深深的信心，这样可以带来好的结果。</div><br />
                    <div class="exp">人事有爻讹</div><br />
                </div>
            </div>
            <div class="botright">
                <div class="one-line">
                    <div class="poe">个人的问题或遭遇，过错或过失很多，事情难以进展吧。</div><br />
                    <div class="exp">伤财防损失</div><br />
                </div>
                <div class="one-line">
                    <div class="poe">就算破财，也会有所得。</div><br />
                    <div class="exp">祈福始中和</div><br />
                </div>
            </div>
        </div>
    </div>
    </div>
</body>

</html>
