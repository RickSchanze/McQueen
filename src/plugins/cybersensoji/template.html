
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @font-face {
            font-family: "fangsong";
            src: url(../../../data/fonts/simfang.ttf);
        }
        
        @font-face {
            font-family: "xinwei";
            src: url(../../../data/fonts/STXINWEI.TTF);
        }
        
        @font-face {
            font-family: "kaiti";
            src: url(../../../data/fonts/STKAITI.TTF);
        }
    
        .main {
            display: flex;
            flex-direction: column;
            width: 700px;
            background-image: url(../../../data/pictures/0.png);
            background-size: cover;
            box-shadow: 5px 5px 20px #c37272;
            margin-left: 13px;
        }

        /* left begin */
        /* 诗词，以及吉凶 */
        .up {
            display: flex;
            flex-direction: row;
            width: 700px;
            background-color: #efefefc2;
        }

        .all {
            font-family: "fangsong";
            font-size: 70px;
            width: 200px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: space-around;
            flex-direction: column;
        }

        .poem {
            font-size: 20px;
        }

        .poem p {
            line-height: 15px;
            color: red;
            font-size: 20px;
        }

        /* 诗词，吉凶 end */
        /* 诗词注解 */
        .bottom {
            width: 700px;
        }

        .explanation {
            font-family: "xinwei";
            font-size: 30px;
            text-align: center;
            width: 700px;
            padding-bottom: 20px;
            padding-top: 20px;
            background-color: #efefefc2;
        }

        .bottom {
            display: flex;
            flex-direction: row;
            background-color: #efefefc2;
        }

        .one-line .poe {
            color:blueviolet;
            font-family: "kaiti";
            font-size: 30px;
        }

        .one-line .exp {
            color: black;
            font-size: 15px;
        }

        li {
            color: brown;
            font-size: 20px;
            margin: 10px;
        }

        .upright {
            width: 400px;
        }

        .botright {
            margin-left: 50px;;
        }
        
        .placeholder {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .one-line {
            height: 120px;
        }
        
        .botleft {
            width: 500px;
        }
        
        .maincover {
            width: 750px;  
        }

    </style>
</head>

<body>
<div class="maincover">
    <div class="main">
        <div class="up">
            <div class="upleft"></div>
            <div class="all">大吉</div>
            <div class="placeholder">
            <div class="poem">
                <p>但存公道正</p>
                <p>何愁理去忠</p>
                <p>松柏苍苍翠</p>
                <p>前山禄马重</p>
            </div>
            </div>
            <div class="upright">

                <ul>
    
        
                    <li>
                        <div class="title">愿望：会实现吧。</div>

                    </li>
        
        
                    <li>
                        <div class="title">疾病：会治好吧。</div>

                    </li>
        
        
                    <li>
                        <div class="title">遗失物：会出来吧。</div>

                    </li>
        
        
                    <li>
                        <div class="title">盼望的人：会出现吧。</div>

                    </li>
        
        
                    <li>
                        <div class="title">盖新居、搬家：好吧。</div>

                    </li>
        
        
                    <li>
                        <div class="title">旅行：好吧。</div>

                    </li>
        
        
                    <li>
                        <div class="title">结婚、交往：全都好吧。</div>

                    </li>
        
    </ul>
            </div>
        </div>
        <div class="explanation">诗词释义</div>
            <div class="bottom">
            <div class="botleft">
                <div class="one-line">
                    <div class="poe">但存公道正</div><br />
                    <div class="exp">守着公共的正道，比起为了自己，更要为了大家做好事吧。</div><br />
                </div>
                <div class="one-line">
                    <div class="poe">何愁理去忠</div><br />
                    <div class="exp">忠实地尽心尽力做事，就算这样反而事情不能顺利进行、立场变坏也要当作没有悲伤叹息的事吧。</div><br />
                </div>
            </div>
            <div class="botright">
                <div class="one-line">
                    <div class="poe">松柏苍苍翠</div><br />
                    <div class="exp">就像松树或柏树经常青翠般地，人的心也要注意要经常走在诚恳的道路吧。</div><br />
                </div>
                <div class="one-line">
                    <div class="poe">前山禄马重</div><br />
                    <div class="exp">到最后会有好事，福德像是满出来般地变得幸福吧。</div><br />
                </div>
            </div>
        </div>
    </div>
    </div>
</body>

</html>
